/offers:
  get:
    tags:
      - Offers
    summary: List offers
    security:
      - bearerAuth: []
    responses:
      '200':
        description: OK
        $ref: '#/components/responses/Paginated'
    parameters:
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/LimitQuery'
  post:
    tags:
      - Offers
    summary: Create provider offer
    security:
      - bearerAuth: []
    responses:
      '201':
        description: Created
        $ref: '#/components/responses/Created'
      '400':
        $ref: '#/components/responses/BadRequest'
      '403':
        $ref: '#/components/responses/Forbidden'
      '422':
        $ref: '#/components/responses/Unprocessable'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - orderId
              - price
            properties:
              orderId:
                type: string
                format: uuid
              price:
                type: number
                minimum: 0.01
                example: 240
              estimatedDuration:
                type: string
                nullable: true
                example: 2 hours
              notes:
                type: string
                nullable: true
                example: Includes loading and unloading.
              validUntil:
                type: string
                format: date-time
                nullable: true
                description: Must be a future ISO 8601 date-time.
                example: '2026-12-31T23:59:59.000Z'
          example:
            orderId: 79c99d75-4d8f-400f-bd15-d7b66ece749f
            price: 240
            estimatedDuration: 2 hours
            notes: Includes loading and unloading.
            validUntil: '2026-12-31T23:59:59.000Z'
/offers/{id}:
  get:
    tags:
      - Offers
    summary: Get offer
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        description: OK
        $ref: '#/components/responses/Success'
      '404':
        $ref: '#/components/responses/NotFound'
/offers/{id}/accept:
  post:
    tags:
      - Offers
    summary: Accept offer
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        description: OK
        $ref: '#/components/responses/Success'
      '403':
        $ref: '#/components/responses/Forbidden'
      '422':
        $ref: '#/components/responses/Unprocessable'
/offers/{id}/reject:
  post:
    tags:
      - Offers
    summary: Reject offer
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        description: OK
        $ref: '#/components/responses/Success'
/offers/{id}/withdraw:
  post:
    tags:
      - Offers
    summary: Withdraw offer
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        description: OK
        $ref: '#/components/responses/Success'
