components:
  parameters:
    PageQuery:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        type: string
        description: Field name (alias sort)
    SortOrderQuery:
      in: query
      name: sortOrder
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
    SearchQuery:
      in: query
      name: search
      required: false
      schema:
        type: string
    StatusQuery:
      in: query
      name: status
      required: false
      schema:
        type: string
    DateFromQuery:
      in: query
      name: dateFrom
      required: false
      schema:
        type: string
        format: date-time
    DateToQuery:
      in: query
      name: dateTo
      required: false
      schema:
        type: string
        format: date-time
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    OrderIdPath:
      in: path
      name: orderId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Success:
      description: Operation successful
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    Created:
      description: Resource created successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    Paginated:
      description: Paginated records retrieved successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PaginatedResponse'
    BadRequest:
      description: Bad request or validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication is required or token is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user does not have access to this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unprocessable:
      description: Request cannot be processed in the current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string
          example: Operation successful
        meta:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        message:
          type: string
        meta:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 20
            total:
              type: integer
              example: 100
            totalPages:
              type: integer
              example: 5
            hasNext:
              type: boolean
              example: true
            hasPrev:
              type: boolean
              example: false
            timestamp:
              type: string
              format: date-time
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: object
          nullable: true
          example: null
        message:
          type: string
          example: An error occurred
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        meta:
          type: object
          properties:
            errorCode:
              type: string
              example: VALIDATION_ERROR
            timestamp:
              type: string
              format: date-time
    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Email is required
    PaginationQuery:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        sort:
          type: string
          default: createdAt
        order:
          type: string
          enum:
            - asc
            - desc
          default: desc
        search:
          type: string
    LoginRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          description: Email or phone number
          example: admin@goodstransfer.com
        password:
          type: string
          format: password
          example: Admin@123
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            user:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
        message:
          type: string
          example: Login successful
    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
