/dashboard/users:
  get:
    tags:
      - Admin Users
    summary: List users
    security:
      - bearerAuth: []
    responses:
      '200':
        description: OK
  post:
    tags:
      - Admin Users
    summary: Create user
    security:
      - bearerAuth: []
    responses:
      '201':
        description: Created
/dashboard/users/{id}:
  get:
    tags:
      - Admin Users
    summary: Get user
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        description: OK
  patch:
    tags:
      - Admin Users
    summary: Update user
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        description: OK
  delete:
    tags:
      - Admin Users
    summary: Soft-delete user
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        description: OK
