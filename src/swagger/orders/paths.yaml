/orders:
  get:
    tags:
      - Orders
    summary: List orders scoped by RBAC and tenant context
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/LimitQuery'
      - $ref: '#/components/parameters/StatusQuery'
      - $ref: '#/components/parameters/DateFromQuery'
      - $ref: '#/components/parameters/DateToQuery'
    responses:
      '200':
        description: OK
        $ref: '#/components/responses/Paginated'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
  post:
    tags:
      - Orders
    summary: Create order
    security:
      - bearerAuth: []
    responses:
      '201':
        description: Created
        $ref: '#/components/responses/Created'
      '400':
        $ref: '#/components/responses/BadRequest'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - serviceId
            properties:
              serviceId:
                type: string
                format: uuid
              workerCount:
                type: integer
                minimum: 1
              isFragile:
                type: boolean
              notes:
                type: string
                nullable: true
              scheduledDate:
                type: string
                format: date-time
              scheduledTimeSlot:
                type: string
                nullable: true
              estimatedPrice:
                type: number
              locations:
                type: array
                items:
                  type: object
                  required:
                    - type
                    - addressLine
                    - city
                  properties:
                    type:
                      type: string
                      enum:
                        - pickup
                        - dropoff
                    addressLine:
                      type: string
                    city:
                      type: string
                    area:
                      type: string
                      nullable: true
                    latitude:
                      type: number
                    longitude:
                      type: number
                    floor:
                      type: integer
                    unit:
                      type: string
                      nullable: true
                    hasElevator:
                      type: boolean
                    contactName:
                      type: string
                      nullable: true
                    contactPhone:
                      type: string
                      nullable: true
                    notes:
                      type: string
                      nullable: true
              items:
                type: array
                items:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    quantity:
                      type: integer
                      minimum: 1
                    description:
                      type: string
                      nullable: true
                    isFragile:
                      type: boolean
                    weight:
                      type: number
                    dimensions:
                      type: string
                      nullable: true
/orders/{id}:
  get:
    tags:
      - Orders
    summary: Get order by id
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
