/auth/login:
  post:
    tags:
      - Auth
    summary: Login with email or phone
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginResponse'
      '400':
        $ref: '#/components/responses/BadRequest'
      '401':
        $ref: '#/components/responses/Unauthorized'
        description: Unauthorized
/auth/refresh:
  post:
    tags:
      - Auth
    summary: Refresh access token
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RefreshRequest'
    responses:
      '200':
        $ref: '#/components/responses/Success'
        description: OK
      '400':
        $ref: '#/components/responses/BadRequest'
      '401':
        $ref: '#/components/responses/Unauthorized'
/auth/logout:
  post:
    tags:
      - Auth
    summary: Revoke refresh token
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
    responses:
      '200':
        $ref: '#/components/responses/Success'
        description: OK
      '400':
        $ref: '#/components/responses/BadRequest'
      '401':
        $ref: '#/components/responses/Unauthorized'
/auth/forgot-password:
  post:
    tags:
      - Auth
    summary: Request password reset (email)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
    responses:
      '200':
        $ref: '#/components/responses/Success'
        description: Generic success (no user enumeration)
      '400':
        $ref: '#/components/responses/BadRequest'
/auth/reset-password:
  post:
    tags:
      - Auth
    summary: Complete password reset with token
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - token
              - newPassword
            properties:
              token:
                type: string
              newPassword:
                type: string
                format: password
                minLength: 8
                maxLength: 128
    responses:
      '200':
        $ref: '#/components/responses/Success'
        description: Password updated
      '400':
        $ref: '#/components/responses/BadRequest'
/auth/send-otp:
  post:
    tags:
      - Auth
    summary: Send OTP to email or phone
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - identifier
              - type
            properties:
              identifier:
                type: string
                description: Email or phone matching the account
              type:
                type: string
                enum:
                  - email
                  - phone
    responses:
      '200':
        $ref: '#/components/responses/Success'
        description: Generic success
      '400':
        $ref: '#/components/responses/BadRequest'
/auth/verify-otp:
  post:
    tags:
      - Auth
    summary: Verify OTP code
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - identifier
              - code
              - type
            properties:
              identifier:
                type: string
              code:
                type: string
                pattern: ^\\d{4,8}$
              type:
                type: string
                enum:
                  - email
                  - phone
    responses:
      '200':
        $ref: '#/components/responses/Success'
        description: Verified
      '400':
        $ref: '#/components/responses/BadRequest'
      '401':
        $ref: '#/components/responses/Unauthorized'
        description: Invalid code
/auth/me:
  get:
    tags:
      - Auth
    summary: Current user profile and tenant context
    security:
      - bearerAuth: []
    responses:
      '200':
        $ref: '#/components/responses/Success'
        description: OK
      '401':
        $ref: '#/components/responses/Unauthorized'
