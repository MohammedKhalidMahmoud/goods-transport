/services:
  get:
    tags:
      - Services
    summary: List services
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/LimitQuery'
      - $ref: '#/components/parameters/SortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
    responses:
      '200':
        $ref: '#/components/responses/Paginated'
        description: OK
/services/{id}:
  get:
    tags:
      - Services
    summary: Get service
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        $ref: '#/components/responses/Success'
      '404':
        $ref: '#/components/responses/NotFound'
/dashboard/services:
  get:
    tags:
      - Admin Services
    summary: List services
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/LimitQuery'
      - $ref: '#/components/parameters/SortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
    responses:
      '200':
        $ref: '#/components/responses/Paginated'
        description: OK
  post:
    tags:
      - Admin Services
    summary: Create service
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - name
            properties:
              code:
                type: string
              name:
                type: string
              nameAr:
                type: string
                nullable: true
              description:
                type: string
                nullable: true
              sortOrder:
                type: integer
              isActive:
                type: boolean
    responses:
      '201':
        $ref: '#/components/responses/Created'
      '400':
        $ref: '#/components/responses/BadRequest'
/dashboard/services/{id}:
  get:
    tags:
      - Admin Services
    summary: Get service
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        $ref: '#/components/responses/Success'
      '404':
        $ref: '#/components/responses/NotFound'
  patch:
    tags:
      - Admin Services
    summary: Update service
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
              name:
                type: string
              nameAr:
                type: string
                nullable: true
              description:
                type: string
                nullable: true
              sortOrder:
                type: integer
              isActive:
                type: boolean
    responses:
      '200':
        $ref: '#/components/responses/Success'
      '400':
        $ref: '#/components/responses/BadRequest'
  delete:
    tags:
      - Admin Services
    summary: Delete service
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/IdPath'
    responses:
      '200':
        $ref: '#/components/responses/Success'
